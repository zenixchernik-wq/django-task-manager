{% extends "tasks/base.html" %}

{% block title %}{{ profile.name }}{% endblock title %}

{% block content %}
    <h1>{{ profile.name }}</h1>
    <p>{{ profile.bio }}</p>

    {% if profile.avatar %}
        <img src="{{ profile.avatar.url }}" alt="{{ profile.name }}" width="200">
    {% endif %}
{% endblock content %}
